apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app01
  labels:
    app: todo-app01
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app01
  template:
    metadata:
      labels:
        app: todo-app01
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app01
        image: 183071452060.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app01:dc4ef19
        ports:
        - containerPort: 5000
